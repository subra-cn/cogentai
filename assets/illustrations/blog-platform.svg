<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#0B1221"/>
  <g transform="translate(80, 40)">
    <!-- MCP hub diagram -->
    <circle cx="120" cy="60" r="30" fill="#8B5CF6" fill-opacity="0.1" stroke="#8B5CF6" stroke-width="1"/>
    <text x="120" y="56" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#A78BFA">MCP</text>
    <text x="120" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#64748B">Protocol</text>

    <circle cx="30" cy="20" r="18" fill="#151D2E" stroke="#3B82F6" stroke-width="0.5"/>
    <text x="30" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#64748B">ERP</text>

    <circle cx="210" cy="20" r="18" fill="#151D2E" stroke="#06B6D4" stroke-width="0.5"/>
    <text x="210" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#64748B">CRM</text>

    <circle cx="30" cy="100" r="18" fill="#151D2E" stroke="#10B981" stroke-width="0.5"/>
    <text x="30" y="104" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#64748B">HRMS</text>

    <circle cx="210" cy="100" r="18" fill="#151D2E" stroke="#F59E0B" stroke-width="0.5"/>
    <text x="210" y="104" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#64748B">Docs</text>

    <line x1="48" y1="28" x2="92" y2="48" stroke="#3B82F6" stroke-width="0.8" opacity="0.4"/>
    <line x1="192" y1="28" x2="148" y2="48" stroke="#06B6D4" stroke-width="0.8" opacity="0.4"/>
    <line x1="48" y1="92" x2="92" y2="72" stroke="#10B981" stroke-width="0.8" opacity="0.4"/>
    <line x1="192" y1="92" x2="148" y2="72" stroke="#F59E0B" stroke-width="0.8" opacity="0.4"/>

    <circle r="1.5" fill="#3B82F6" opacity="0.8">
      <animateMotion path="M48,28 L92,48" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#06B6D4" opacity="0.8">
      <animateMotion path="M148,48 L192,28" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
