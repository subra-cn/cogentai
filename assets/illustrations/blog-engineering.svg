<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#0B1221"/>
  <g transform="translate(50, 30)">
    <!-- Code/terminal mockup -->
    <rect x="0" y="0" width="300" height="140" rx="8" fill="#151D2E" stroke="#1E293B" stroke-width="1"/>
    <rect x="0" y="0" width="300" height="28" rx="8" fill="#1A2234"/>
    <rect x="0" y="20" width="300" height="8" fill="#1A2234"/>
    <circle cx="16" cy="14" r="4" fill="#EF4444" opacity="0.6"/>
    <circle cx="28" cy="14" r="4" fill="#F59E0B" opacity="0.6"/>
    <circle cx="40" cy="14" r="4" fill="#10B981" opacity="0.6"/>
    <text x="16" y="52" font-family="monospace" font-size="9" fill="#3B82F6" opacity="0.8">agent</text>
    <text x="50" y="52" font-family="monospace" font-size="9" fill="#94A3B8">.plan(</text>
    <text x="88" y="52" font-family="monospace" font-size="9" fill="#10B981">"reconcile Q4"</text>
    <text x="180" y="52" font-family="monospace" font-size="9" fill="#94A3B8">)</text>
    <text x="16" y="68" font-family="monospace" font-size="9" fill="#3B82F6" opacity="0.8">agent</text>
    <text x="50" y="68" font-family="monospace" font-size="9" fill="#94A3B8">.execute(</text>
    <text x="102" y="68" font-family="monospace" font-size="9" fill="#F59E0B">tools</text>
    <text x="130" y="68" font-family="monospace" font-size="9" fill="#94A3B8">=</text>
    <text x="137" y="68" font-family="monospace" font-size="9" fill="#94A3B8">[</text>
    <text x="143" y="68" font-family="monospace" font-size="9" fill="#10B981">sap, m365</text>
    <text x="207" y="68" font-family="monospace" font-size="9" fill="#94A3B8">])</text>
    <text x="16" y="84" font-family="monospace" font-size="9" fill="#3B82F6" opacity="0.8">agent</text>
