<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="agent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="opt-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="data-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Agent Layer -->
  <rect x="50" y="20" width="700" height="70" rx="12" fill="url(#agent-grad)" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="90" cy="55" r="16" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" stroke-width="1"/>
  <text x="90" y="59" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#3B82F6">&#x1F916;</text>
  <text x="120" y="50" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#F1F5F9">Agent Layer</text>
  <text x="120" y="66" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8">Purpose-built agents for KPIs, workflows, decisions</text>
  <g transform="translate(500, 35)">
    <rect x="0" y="0" width="60" height="24" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="0.5"/>
    <text x="30" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#60A5FA">Finance</text>
  </g>
  <g transform="translate(570, 35)">
    <rect x="0" y="0" width="60" height="24" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="0.5"/>
    <text x="30" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#60A5FA">Procure</text>
  </g>
  <g transform="translate(640, 35)">
    <rect x="0" y="0" width="60" height="24" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="0.5"/>
    <text x="30" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#60A5FA">Comply</text>
  </g>

  <!-- Connector -->
  <line x1="400" y1="90" x2="400" y2="110" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="396,108 404,108 400,114" fill="#334155"/>

  <!-- Optimization Layer -->
  <rect x="50" y="115" width="700" height="70" rx="12" fill="url(#opt-grad)" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="90" cy="150" r="16" fill="#06B6D4" fill-opacity="0.2" stroke="#06B6D4" stroke-width="1"/>
  <text x="90" y="154" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#06B6D4">&#x2699;</text>
  <text x="120" y="145" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#F1F5F9">Optimization Layer</text>
  <text x="120" y="161" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8">LLM-agnostic orchestration, context injection, prompt governance</text>
  <g transform="translate(530, 132)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-width="0.5"/>
    <text x="40" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#22D3EE">RAG + Tuning</text>
  </g>
  <g transform="translate(620, 132)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-width="0.5"/>
    <text x="40" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#22D3EE">Multi-LLM</text>
  </g>

  <!-- Connector -->
  <line x1="400" y1="185" x2="400" y2="205" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="396,203 404,203 400,209" fill="#334155"/>

  <!-- Data Layer -->
  <rect x="50" y="210" width="700" height="70" rx="12" fill="url(#data-grad)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="90" cy="245" r="16" fill="#8B5CF6" fill-opacity="0.2" stroke="#8B5CF6" stroke-width="1"/>
  <text x="90" y="249" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#8B5CF6">&#x1F512;</text>
  <text x="120" y="240" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#F1F5F9">Data Layer</text>
  <text x="120" y="256" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8">MCP-native access, zero migration, data sovereignty, lineage</text>
  <g transform="translate(500, 227)">
    <rect x="0" y="0" width="60" height="24" rx="4" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="0.5"/>
    <text x="30" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#A78BFA">On-Prem</text>
  </g>
  <g transform="translate(570, 227)">
    <rect x="0" y="0" width="50" height="24" rx="4" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="0.5"/>
    <text x="25" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#A78BFA">VPC</text>
  </g>
  <g transform="translate(630, 227)">
    <rect x="0" y="0" width="70" height="24" rx="4" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="0.5"/>
    <text x="35" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#A78BFA">Air-Gap</text>
  </g>
</svg>
